/* ============================================================
   CHRISTOPHER'S LIFE — Main Stylesheet
   Dark slate + teal. Geometric. Sophisticated.
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap');

/* ---- Variables ---- */
:root {
  --bg:          #0c1419;
  --bg-2:        #111c24;
  --surface:     #1a2530;
  --surface-2:   #1f2e3a;
  --surface-3:   #243545;
  --border:      rgba(255,255,255,0.08);
  --border-2:    rgba(255,255,255,0.14);
  --teal:        #2dd4bf;
  --teal-dim:    #14b8a6;
  --teal-deep:   #0d9488;
  --teal-glow:   rgba(45,212,191,0.15);
  --text:        #e2eaf0;
  --text-2:      #94a3b8;
  --text-3:      #64748b;
  --danger:      #f87171;
  --warning:     #fbbf24;
  --success:     #34d399;
  --radius:      14px;
  --radius-sm:   8px;
  --radius-lg:   20px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --shadow-teal: 0 4px 20px rgba(45,212,191,0.2);

  /* Day type colors */
  --travel:   #0ea5e9;
  --rest:     #64748b;
  --rowing:   #10b981;
  --recovery: #f59e0b;
  --flexible: #8b5cf6;

  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;
}

/* ---- Reset ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ---- Layout ---- */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

.page {
  display: none;
  padding: 0 0 100px 0;
  min-height: 100vh;
  animation: fadeIn 0.2s ease;
}

.page.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.section-pad { padding: 0 16px; }

/* ---- Header ---- */
.page-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 16px 12px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.app-wordmark {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--teal);
  opacity: 0.8;
}

.header-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  line-height: 1.2;
}

.header-subtitle {
  font-size: 12px;
  color: var(--text-3);
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}

/* ---- Navigation ---- */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 4px calc(8px + env(safe-area-inset-bottom));
  z-index: 100;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 4px;
  border: none;
  background: none;
  color: var(--text-3);
  font-size: 10px;
  font-family: var(--font-body);
  font-weight: 500;
  letter-spacing: 0.3px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.15s ease;
  text-transform: uppercase;
}

.nav-item .nav-icon { font-size: 20px; line-height: 1; }

.nav-item.active {
  color: var(--teal);
}

.nav-item.active .nav-icon {
  filter: drop-shadow(0 0 6px rgba(45,212,191,0.5));
}

/* ---- Day Selector ---- */
.day-selector {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}

.day-selector::-webkit-scrollbar { display: none; }

.day-btn {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-3);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
  min-width: 44px;
}

.day-btn .day-abbr { font-size: 11px; }
.day-btn .day-progress { font-size: 9px; opacity: 0.6; font-family: var(--font-mono); }

.day-btn.selected {
  background: var(--teal);
  border-color: var(--teal);
  color: #0c1419;
  box-shadow: var(--shadow-teal);
}

.day-btn.today::after {
  content: '';
  position: absolute;
  top: 4px;
  right: 4px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--teal);
}

.day-btn.selected.today::after {
  background: #0c1419;
}

/* ---- Progress Ring ---- */
.progress-ring-wrap {
  position: relative;
  width: 52px;
  height: 52px;
  flex-shrink: 0;
}

.progress-ring-wrap svg { transform: rotate(-90deg); }

.progress-ring-wrap .ring-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-mono);
}

/* ---- Cards ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.card-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-3);
}

/* ---- Task Items ---- */
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 11px 14px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: left;
  width: 100%;
  font-family: var(--font-body);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
}

.task-item:active { transform: scale(0.98); }

.task-item.checked {
  opacity: 0.5;
  background: var(--surface);
}

.task-item.checked .task-label {
  text-decoration: line-through;
  color: var(--text-3);
}

.task-checkbox {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border-2);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: all 0.15s ease;
}

.task-item.checked .task-checkbox {
  background: var(--teal);
  border-color: var(--teal);
}

.task-checkbox svg { display: none; }
.task-item.checked .task-checkbox svg { display: block; }

.task-content { flex: 1; min-width: 0; }

.task-label {
  font-size: 14px;
  font-weight: 400;
  line-height: 1.4;
}

.task-label-es {
  font-size: 11px;
  color: var(--teal-dim);
  opacity: 0.7;
  margin-top: 1px;
}

.task-icon {
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 1px;
}

/* ---- Section Headers ---- */
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 16px 16px 8px;
}

.section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-3);
}

.section-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ---- Progress Bar ---- */
.progress-bar-wrap {
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
  height: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 999px;
  background: var(--teal);
  transition: width 0.4s ease;
}

/* ---- Day Type Badge ---- */
.day-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
  border: 1px solid currentColor;
  opacity: 0.8;
}

/* ---- Nicotine Banner ---- */
#nicotine-banner {
  display: none;
  position: sticky;
  top: 0;
  z-index: 60;
  background: rgba(13, 148, 136, 0.12);
  border-bottom: 1px solid rgba(45,212,191,0.25);
  padding: 10px 16px;
  backdrop-filter: blur(10px);
}

.nicotine-banner-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.nicotine-banner-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nicotine-icon { font-size: 18px; }

.nicotine-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--teal);
  line-height: 1.2;
}

.nicotine-sublabel {
  font-size: 10px;
  color: var(--text-3);
  margin-top: 1px;
}

.nicotine-banner-right { text-align: right; min-width: 60px; }

.nicotine-countdown {

.scale-selector {

}

.scale-btn {

  color: var(--text-2);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-mono);
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: center;
}

.scale-btn:hover { border-color: var(--teal); color: var(--teal); }

.scale-btn.selected {
  background: var(--teal);

  color: #0c1419;
  font-weight: 700;
}

.scale-description {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-3);
  min-height: 18px;

}

.scale-description strong { color: var(--teal); }

/* ---- Charts ---- */
.chart-container {
  position: relative;
  height: 160px;
  width: 100%;
}

/* ---- Buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}

.btn-primary {
  background: var(--teal);
  color: #0c1419;
}

.btn-primary:active { background: var(--teal-dim); transform: scale(0.97); }

.btn-secondary {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border-2);
}

.btn-secondary:active { transform: scale(0.97); }

.btn-danger {
  background: rgba(248,113,113,0.1);
  color: var(--danger);
  border: 1px solid rgba(248,113,113,0.3);
}

.btn-full { width: 100%; }

.btn-sm { padding: 8px 14px; font-size: 12px; }

/* ---- Inputs ---- */
input[type="text"],
input[type="number"],
input[type="time"],
textarea,
select {
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  padding: 10px 12px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s ease;
}

input:focus, textarea:focus, select:focus {
  border-color: var(--teal);
}

input::placeholder { color: var(--text-3); }

/* ---- Modal ---- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  backdrop-filter: blur(4px);
  align-items: flex-end;
  justify-content: center;
}

.modal-overlay.open {
  display: flex;
  animation: slideUp 0.25s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }

  background: var(--bg-2);
  border: 1px solid var(--border-2);

  max-height: 85vh;

  background: var(--border-2);

.modal-title {

  font-size: 20px;
  font-weight: 700;

.reading-text-en {

/* ---- Vocab Card ---- */
.vocab-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);

  margin-bottom: 10px;

.vocab-word {

  font-weight: 700;
  color: var(--teal);

.vocab-translation {

.vocab-example { font-size: 13px; line-height: 1.5; }

/* ---- Macro Tracker ---- */
.macro-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);

}

.macro-cell {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 6px;
  text-align: center;
}

.macro-value {
  font-size: 18px;
  font-weight: 700;
  font-family: var(--font-mono);
  line-height: 1;
}

.macro-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-3);
  margin-top: 3px;
}

.macro-bar-wrap {
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
  margin-top: 6px;
  overflow: hidden;
}

.macro-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 0.3s ease;
}

/* ---- Streak Display ---- */
.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;

  border-radius: var(--radius-sm);

}

.streak-number {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--teal);
  line-height: 1;

/* ---- Taper Progress ---- */
.taper-phase {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.taper-phase:last-child { border-bottom: none; }

.taper-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;

}

.taper-dot.active { background: var(--teal); box-shadow: 0 0 8px var(--teal); }
.taper-dot.done { background: var(--success); }
.taper-dot.pending { background: var(--surface-3); }

/* ---- Scan Upload ---- */
.scan-upload-zone {
  border: 2px dashed var(--border-2);
  border-radius: var(--radius);
  padding: 32px 20px;

  transition: all 0.2s ease;
}

.scan-upload-zone:hover, .scan-upload-zone.drag-over {
  border-color: var(--teal);
  background: var(--teal-glow);
}

/* ---- Stat Row ---- */
.stat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.stat-row:last-child { border-bottom: none; }

.stat-label { font-size: 13px; color: var(--text-2); }
.stat-value { font-size: 15px; font-weight: 600; font-family: var(--font-mono); }

/* ---- AI Insight ---- */
.ai-insight {
  background: linear-gradient(135deg, var(--surface) 0%, rgba(45,212,191,0.05) 100%);

.ai-insight-header {

  align-items: center;

  border: 1px solid rgba(45,212,191,0.2);
  padding: 2px 6px;
  border-radius: 4px;
}

.ai-content {
  font-size: 13px;
  line-height: 1.65;
  color: var(--text-2);

.ai-loading {

  gap: 8px;
  font-size: 13px;
  color: var(--text-3);

.ai-loading-dot {

  font-size: 11px;
  font-weight: 700;

  letter-spacing: 1.2px;

.settings-row {

.settings-row:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.settings-row:last-child { border-radius: 0 0 var(--radius) var(--radius); border-bottom: none; }
.settings-row:only-child { border-radius: var(--radius); border-bottom: none; }

.settings-label { font-size: 14px; }
.settings-sublabel { font-size: 11px; color: var(--text-3); margin-top: 2px; }

/* Toggle */
.toggle {
  position: relative;
  width: 44px;
  height: 26px;
  flex-shrink: 0;
}

.toggle input { opacity: 0; width: 0; height: 0; }

.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--surface-3);
  border-radius: 13px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.toggle-slider::before {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: all 0.2s ease;
}

.toggle input:checked + .toggle-slider { background: var(--teal); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* ---- Scroll ---- */
.scroll-x {
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}

.scroll-x::-webkit-scrollbar { display: none; }

/* ---- Chip ---- */
.chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;

  font-weight: 600;

.empty-state-icon { font-size: 36px; margin-bottom: 10px; }

#splash {

.splash-sub {

  color: var(--text-3);

/* ---- Responsive safe areas ---- */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bottom-nav { padding-bottom: calc(8px + env(safe-area-inset-bottom)); }

  const swCode = `
const CACHE = 'cl-v2';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => { self.clients.claim(); });
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      const net = fetch(e.request).then(resp => {
        if (resp && resp.status === 200 && resp.type !== 'opaque') {
          const clone = resp.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));

    })

});
self.addEventListener('push', e => {
  if (!e.data) return;
  try {
    const d = e.data.json();
    e.waitUntil(self.registration.showNotification(d.title, {
      body: d.body, tag: d.tag || 'cl', requireInteraction: d.persistent || false

self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(clients.openWindow('./'));
});

CL.Storage = {

  // Get week key for current week
  getWeekKey() {
    const now = new Date();
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - now.getDay());
    return `${weekStart.getFullYear()}-${String(weekStart.getMonth()+1).padStart(2,'0')}-${String(weekStart.getDate()).padStart(2,'0')}`;
  },

  // Get today's date string
  getTodayKey() {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  },

  // ---- CHECKLIST ----
  getChecked(dayIndex) {
    const key = `cl_checked_${this.getWeekKey()}_${dayIndex}`;
    try { return JSON.parse(localStorage.getItem(key)) || {}; }
    catch { return {}; }
  },

  setChecked(dayIndex, taskId, value) {
    const key = `cl_checked_${this.getWeekKey()}_${dayIndex}`;
    const data = this.getChecked(dayIndex);
    if (value) data[taskId] = true;
    else delete data[taskId];
    localStorage.setItem(key, JSON.stringify(data));
    CL.Streaks.update();
  },

  resetDay(dayIndex) {
    const key = `cl_checked_${this.getWeekKey()}_${dayIndex}`;
    localStorage.removeItem(key);
  },

  // ---- SETTINGS ----
  getSettings() {
    try { return JSON.parse(localStorage.getItem('cl_settings')) || {}; }
    catch { return {}; }
  },

  saveSetting(key, value) {
    const settings = this.getSettings();
    settings[key] = value;
    localStorage.setItem('cl_settings', JSON.stringify(settings));
  },

  getSetting(key, defaultValue) {
    const settings = this.getSettings();
    return settings[key] !== undefined ? settings[key] : defaultValue;
  },

  // ---- SCHEDULE ----
  getSchedule() {
    try {
      const saved = JSON.parse(localStorage.getItem('cl_schedule')) || {};
      return Object.assign({}, CL.DEFAULT_SCHEDULE, saved);
    } catch { return { ...CL.DEFAULT_SCHEDULE }; }
  },

  saveScheduleItem(key, value) {
    try {
      const schedule = JSON.parse(localStorage.getItem('cl_schedule')) || {};
      schedule[key] = Object.assign(CL.DEFAULT_SCHEDULE[key] || {}, value);
      localStorage.setItem('cl_schedule', JSON.stringify(schedule));
    } catch {}
  },

  // ---- DAILY LOGS ----
  getDailyLog(dateKey) {
    dateKey = dateKey || this.getTodayKey();
    try { return JSON.parse(localStorage.getItem(`cl_log_${dateKey}`)) || {}; }
    catch { return {}; }
  },

  saveDailyLog(data, dateKey) {
    dateKey = dateKey || this.getTodayKey();
    const existing = this.getDailyLog(dateKey);
    const merged = Object.assign(existing, data);
    localStorage.setItem(`cl_log_${dateKey}`, JSON.stringify(merged));
  },

  // ---- BODY SCANS ----
  getScans() {
    try { return JSON.parse(localStorage.getItem('cl_scans')) || []; }
    catch { return []; }
  },

  saveScan(scan) {
    const scans = this.getScans();
    scan.id = Date.now();
    scan.date = this.getTodayKey();
    scans.unshift(scan);
    localStorage.setItem('cl_scans', JSON.stringify(scans));
    return scan;
  },

  deleteScan(id) {
    const scans = this.getScans().filter(s => s.id !== id);
    localStorage.setItem('cl_scans', JSON.stringify(scans));
  },

  // ---- MACROS ----
  getMacroLog(dateKey) {
    dateKey = dateKey || this.getTodayKey();
    try { return JSON.parse(localStorage.getItem(`cl_macros_${dateKey}`)) || { meals: {} }; }
    catch { return { meals: {} }; }
  },

  saveMacroEntry(meal, data, dateKey) {
    dateKey = dateKey || this.getTodayKey();
    const log = this.getMacroLog(dateKey);
    log.meals[meal] = data;
    localStorage.setItem(`cl_macros_${dateKey}`, JSON.stringify(log));
  },

  getMacroTotals(dateKey) {
    const log = this.getMacroLog(dateKey);
    const totals = { calories: 0, protein: 0, carbs: 0, fat: 0 };
    const tracked = ['breakfast', 'morningSnack', 'lunch', 'afternoonSnack'];
    tracked.forEach(meal => {
      if (log.meals[meal]) {
        totals.calories += Number(log.meals[meal].calories) || 0;
        totals.protein  += Number(log.meals[meal].protein)  || 0;
        totals.carbs    += Number(log.meals[meal].carbs)    || 0;
        totals.fat      += Number(log.meals[meal].fat)      || 0;
      }
    });
    return totals;
  },

  // ---- ALCOHOL & VAPING LOGS ----

    dateKey = dateKey || this.getTodayKey();

  // ---- AI CACHE ----
  getCachedInsight(key) {
    try {
      const cached = JSON.parse(localStorage.getItem(`cl_ai_${key}`));
      if (!cached) return null;
      // Expire after 7 days
      if (Date.now() - cached.timestamp > 7 * 24 * 60 * 60 * 1000) {
        localStorage.removeItem(`cl_ai_${key}`);
        return null;
      }
      return cached.content;
    } catch { return null; }
  },

  cacheInsight(key, content) {

  // ---- HEALTH CONNECT ----
  getHealthData(dateKey) {

    try { return JSON.parse(localStorage.getItem(`cl_health_${dateKey}`)) || {}; }
    catch { return {}; }
  },

  saveHealthData(data, dateKey) {
    dateKey = dateKey || this.getTodayKey();
    const existing = this.getHealthData(dateKey);
    localStorage.setItem(`cl_health_${dateKey}`, JSON.stringify(Object.assign(existing, data)));
  },

  // ---- READINGS HISTORY ----
  getReadingHistory() {
    try { return JSON.parse(localStorage.getItem('cl_readings')) || {}; }
    catch { return {}; }
  },

  markReadingShown(id) {
    const history = this.getReadingHistory();
    history[id] = (history[id] || 0) + 1;
    localStorage.setItem('cl_readings', JSON.stringify(history));
  },

  // Get next reading based on mood and history
  getNextReading(mood) {
    const history = this.getReadingHistory();
    let pool = [...CL.READINGS];

    // Filter by mood — gentler readings for low mood
    if (mood && mood <= 4) {
      const gentle = pool.filter(r => ['acceptance', 'resilience', 'gratitude', 'change'].includes(r.theme));
      if (gentle.length > 0) pool = gentle;
    } else if (mood && mood >= 8) {
      const ambitious = pool.filter(r => ['action', 'intention', 'possibility', 'obstacles'].includes(r.theme));
      if (ambitious.length > 0) pool = ambitious;
    }

    // Prefer unshown readings
    const unshown = pool.filter(r => !history[r.id]);
    if (unshown.length > 0) {
      const reading = unshown[Math.floor(Math.random() * unshown.length)];
      this.markReadingShown(reading.id);
      return reading;
    }

    // All shown — return least shown
    pool.sort((a, b) => (history[a.id] || 0) - (history[b.id] || 0));
    return pool[0];
  },

  // Get today's vocab word
  getTodayVocab() {
    const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
    return CL.VOCAB[dayOfYear % CL.VOCAB.length];
  },

  // Get today's affirmation
  getTodayAffirmation() {
    const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
    return CL.AFFIRMATIONS[dayOfYear % CL.AFFIRMATIONS.length];
  },

  // ---- EXPORT (for doctor visits) ----
  exportWeekData() {
    const weekKey = this.getWeekKey();
    const data = {
      week: weekKey,
      exported: new Date().toISOString(),
      profile: CL.PROFILE,
      days: {}
    };

    for (let d = 0; d < 7; d++) {
      const date = new Date();
      date.setDate(date.getDate() - date.getDay() + d);
      const dateKey = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
      data.days[d] = {
        checked: this.getChecked(d),
        log: this.getDailyLog(dateKey),
        substance: this.getSubstanceLog(dateKey),
        inhaler: this.getInhalerLog(dateKey),
        health: this.getHealthData(dateKey),
        macros: this.getMacroLog(dateKey)
      };
    }

    return data;
  },

  // Clear all data
  clearAll() {
    const keys = Object.keys(localStorage).filter(k => k.startsWith('cl_'));
    keys.forEach(k => localStorage.removeItem(k));
  }
};

// CHRISTOPHER'S LIFE — Audio Module
// Brown noise generation + Spotify integration
// ============================================================

CL.Audio = {
  audioCtx: null,
  brownNoiseNode: null,
  brownNoiseGain: null,
  isPlayingBrownNoise: false,
  fadeInterval: null,

  // Initialize Web Audio API
  init() {
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.warn("Web Audio API not available:", e);
    }
  },

  // Generate brown noise using Web Audio API
  generateBrownNoise() {
    if (!this.audioCtx) this.init();
    if (!this.audioCtx) return;

    const bufferSize = 4096;
    const node = this.audioCtx.createScriptProcessor(bufferSize, 1, 1);
    let lastOut = 0.0;

    node.onaudioprocess = (e) => {
      const output = e.outputBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        const white = Math.random() * 2 - 1;
        output[i] = (lastOut + (0.02 * white)) / 1.02;
        lastOut = output[i];
        output[i] *= 3.5; // Amplify
      }
    };

    return node;
  },

  // Start brown noise
  startBrownNoise(volume) {
    if (this.isPlayingBrownNoise) return;
    if (!this.audioCtx) this.init();
    if (!this.audioCtx) return;

    // Resume context if suspended (mobile requirement)
    if (this.audioCtx.state === 'suspended') {
      this.audioCtx.resume();
    }

    this.brownNoiseGain = this.audioCtx.createGain();
    this.brownNoiseGain.gain.value = volume !== undefined ? volume : CL.Storage.getSetting('brownNoiseVolume', 0.5);

    this.brownNoiseNode = this.generateBrownNoise();
    if (!this.brownNoiseNode) return;

    this.brownNoiseNode.connect(this.brownNoiseGain);
    this.brownNoiseGain.connect(this.audioCtx.destination);
    this.isPlayingBrownNoise = true;

    CL.Storage.saveSetting('brownNoiseActive', true);
    this.updateBrownNoiseUI(true);
  },

  // Stop brown noise with optional fade
  stopBrownNoise(fadeDuration) {
    if (!this.isPlayingBrownNoise || !this.brownNoiseGain) return;

    const fadeMs = fadeDuration !== undefined
      ? fadeDuration * 1000
      : CL.Storage.getSetting('brownNoiseFadeSeconds', 60) * 1000;

    if (fadeMs > 0 && this.audioCtx) {
      const currentVolume = this.brownNoiseGain.gain.value;
      const steps = 50;
      const stepTime = fadeMs / steps;
      let step = 0;

      this.fadeInterval = setInterval(() => {
        step++;
        const newVol = currentVolume * (1 - step / steps);
        if (this.brownNoiseGain) this.brownNoiseGain.gain.value = Math.max(0, newVol);

        if (step >= steps) {
          clearInterval(this.fadeInterval);
          this._disconnectBrownNoise();
        }
      }, stepTime);
    } else {
      this._disconnectBrownNoise();
    }
  },

  _disconnectBrownNoise() {
    try {
      if (this.brownNoiseNode) { this.brownNoiseNode.disconnect(); this.brownNoiseNode = null; }
      if (this.brownNoiseGain) { this.brownNoiseGain.disconnect(); this.brownNoiseGain = null; }
    } catch {}
    this.isPlayingBrownNoise = false;
    CL.Storage.saveSetting('brownNoiseActive', false);
    this.updateBrownNoiseUI(false);
  },

  // Fade out brown noise then launch Spotify after gap
  morningTransition() {
    const fadeSeconds = CL.Storage.getSetting('brownNoiseFadeSeconds', 60);
    const gapMinutes = CL.Storage.getSetting('brownNoiseToMusicGap', 5);
    const totalDelayMs = (fadeSeconds + (gapMinutes * 60)) * 1000;

    this.stopBrownNoise(fadeSeconds);

    setTimeout(() => {
      CL.Spotify.playMorningMusic();
    }, totalDelayMs);
  },

  setBrownNoiseVolume(vol) {
    if (this.brownNoiseGain) this.brownNoiseGain.gain.value = vol;
    CL.Storage.saveSetting('brownNoiseVolume', vol);
  },

  updateBrownNoiseUI(playing) {
    const btn = document.getElementById('brown-noise-btn');
    const indicator = document.getElementById('brown-noise-indicator');
    if (btn) btn.textContent = playing ? '⏹ Stop Brown Noise' : '▶ Start Brown Noise';
    if (indicator) {
      indicator.className = playing ? 'noise-indicator active' : 'noise-indicator';
      indicator.textContent = playing ? '🔊 Brown noise active' : '';
    }
  }
};

CL.Spotify = {
  token: null,
  refreshToken: null,
  tokenExpiry: null,

  init() {
    const tokens = CL.Storage.getSpotifyTokens();
    if (tokens.accessToken) {
      this.token = tokens.accessToken;
      this.refreshToken = tokens.refreshToken;
      this.tokenExpiry = tokens.expiry;
    }
  },

  isConnected() {
    return !!this.token && Date.now() < (this.tokenExpiry || 0);
  },

  // OAuth flow
  connect() {
    const clientId = CL.Storage.getSetting('spotifyClientId', '');
    if (!clientId) {
      CL.UI.showModal('Spotify Setup', `
        <p>To connect Spotify, you need a Client ID from the Spotify Developer Dashboard.</p>
        <ol>
          <li>Go to <a href="https://developer.spotify.com/dashboard" target="_blank" style="color:var(--teal)">developer.spotify.com/dashboard</a></li>
          <li>Create a new app called "Christopher's Life"</li>
          <li>Add <strong>${window.location.origin}/spotify-callback</strong> as a Redirect URI</li>
          <li>Copy your Client ID and paste it below</li>
        </ol>
        <input type="text" id="spotify-client-id" placeholder="Spotify Client ID" style="width:100%;padding:12px;margin-top:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:14px">
        <button onclick="CL.Spotify.saveClientId()" style="width:100%;margin-top:12px;padding:12px;background:var(--teal);color:black;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer">Save & Connect</button>
      `);
      return;
    }
    this._startOAuth(clientId);
  },

  saveClientId() {
    const input = document.getElementById('spotify-client-id');
    if (!input || !input.value.trim()) return;
    CL.Storage.saveSetting('spotifyClientId', input.value.trim());
    CL.UI.closeModal();
    this.connect();
  },

  _startOAuth(clientId) {
    const redirectUri = encodeURIComponent(window.location.origin + '/spotify-callback.html');
    const scopes = encodeURIComponent('user-read-playback-state user-modify-playback-state streaming user-read-currently-playing');
    const state = Math.random().toString(36).substring(2);
    CL.Storage.saveSetting('spotifyState', state);
    window.location.href = `https://accounts.spotify.com/authorize?client_id=${clientId}&response_type=token&redirect_uri=${redirectUri}&scope=${scopes}&state=${state}`;
  },

  handleCallback(hash) {
    const params = new URLSearchParams(hash.replace('#', ''));
    const token = params.get('access_token');
    const expiresIn = params.get('expires_in');
    if (token) {
      this.token = token;
      this.tokenExpiry = Date.now() + (parseInt(expiresIn) * 1000);
      CL.Storage.saveSpotifyTokens({
        accessToken: token,
        expiry: this.tokenExpiry
      });
      return true;
    }
    return false;
  },

  async play(uri) {
    if (!this.isConnected()) {
      // Fallback: deep link
      window.location.href = `https://open.spotify.com/${uri.replace('spotify:', '').replace(/:/g, '/')}`;
      return;
    }
    try {
      await fetch('https://api.spotify.com/v1/me/player/play', {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${this.token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ context_uri: uri })
      });
    } catch (e) {
      // Fallback to deep link
      window.location.href = `https://open.spotify.com/${uri.replace('spotify:', '').replace(/:/g, '/')}`;
    }
  },

  async pause() {
    if (!this.isConnected()) return;
    try {
      await fetch('https://api.spotify.com/v1/me/player/pause', {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${this.token}` }
      });
    } catch {}
  },

  playMorningMusic() {
    const dayIndex = new Date().getDay();
    const dayAlbum = CL.SPOTIFY.dayAlbums[dayIndex];
    if (dayAlbum === 'shuffle') {
      this.play(CL.SPOTIFY.playlists.morning.uri);
    } else {
      this.play(dayAlbum.uri);
    }
  },

  playRowingMusic() {
    this.play(CL.SPOTIFY.playlists.rowing.uri);
  },

  playCooldownMusic() {
    this.play(CL.SPOTIFY.playlists.cooldown.uri);
  },

  playWindDownMusic() {
    this.play(CL.SPOTIFY.playlists.windDown.uri);
  },

  getStatusHTML() {
    if (this.isConnected()) {
      return `<span style="color:var(--teal)">✓ Spotify connected</span>`;
    }
    return `<button onclick="CL.Spotify.connect()" class="btn-secondary">Connect Spotify</button>`;
  }
};

CL.Notifications = {
  permission: 'default',
  activeTimers: [],
  nicotineWindowInterval: null,

  async init() {
    if ('Notification' in window) {
      this.permission = Notification.permission;
      if (this.permission === 'default') {
        this.permission = await Notification.requestPermission();
      }
    }
    this.scheduleAllNotifications();
    this.startNicotineWindowMonitor();
  },

  // ---- PERMISSION ----
  async requestPermission() {
    if (!('Notification' in window)) return false;
    const result = await Notification.requestPermission();
    this.permission = result;
    return result === 'granted';
  },

  // ---- SCHEDULE ALL NOTIFICATIONS ----
  scheduleAllNotifications() {
    // Clear existing
    this.activeTimers.forEach(t => clearTimeout(t));
    this.activeTimers = [];

    const schedule = CL.Storage.getSchedule();
    const notifSettings = CL.Storage.getNotificationSettings();
    const today = new Date().getDay();
    const dayType = CL.DAY_TYPES[today].type;

    // Build notification schedule for today
    const notifs = this.buildDayNotifications(schedule, dayType, notifSettings);
    notifs.forEach(n => {
      const delay = this.msUntilTime(n.time);
      if (delay > 0 && delay < 24 * 60 * 60 * 1000) {
        const timer = setTimeout(() => {
          this.send(n);
          // Handle special actions
          if (n.action === 'morningTransition') CL.Audio.morningTransition();
          if (n.action === 'spotifyRowing') CL.Spotify.playRowingMusic();
          if (n.action === 'spotifyWindDown') CL.Spotify.playWindDownMusic();
          if (n.action === 'startNicotineWindow') this.startNicotineWindowBanner(n.windowData);
          if (n.action === 'endNicotineWindow') this.endNicotineWindowBanner(n.windowId);
        }, delay);
        this.activeTimers.push(timer);
      }
    });
  },

  buildDayNotifications(schedule, dayType, settings) {
    const notifs = [];
    const t = schedule;

    const isEnabled = (id, defaultVal = true) => {
      const s = settings[id];
      return s ? s.enabled !== false : defaultVal;
    };

    const getTime = (id) => {
      const s = settings[id];
      return s && s.time ? s.time : (t[id] ? t[id].time : null);
    };

    // Wake + morning routine
    if (isEnabled('wake')) notifs.push({
      id: 'wake', time: getTime('wake'),
      title: "⏰ Buenos días, Christopher",
      body: "Despierta | Wake up — no phone yet. Start breathing.",
      action: 'morningTransition'
    });

    // Meals
    if (isEnabled('breakfast')) notifs.push({
      id: 'breakfast', time: getTime('breakfast'),
      title: "🥚 Desayuno | Breakfast",
      body: "Eggs + peppers + whole grain toast. Eat now."
    });

    if (isEnabled('morningSnack')) notifs.push({
      id: 'morningSnack', time: getTime('morningSnack'),
      title: "🥜 Merienda | Morning Snack",
      body: "Yogurt + pistachios. Don't skip — 4hr rule."
    });

    if (isEnabled('lunch')) notifs.push({
      id: 'lunch', time: getTime('lunch'),
      title: "🍗 Almuerzo | Lunch",
      body: "Biggest meal of the day. Protein + carb + veg."
    });

    if (isEnabled('afternoonSnack')) notifs.push({
      id: 'afternoonSnack', time: getTime('afternoonSnack'),
      title: "🍵 Merienda tarde | Afternoon Snack",
      body: "Protein bar + matcha. Pre-exercise fuel if training today."
    });

    if (isEnabled('dinner')) notifs.push({
      id: 'dinner', time: getTime('dinner'),
      title: "🥦 Cena | Dinner",
      body: "Lean protein + veg + smaller grain than lunch."
    });

    if (isEnabled('kitchenClose')) notifs.push({
      id: 'kitchenClose', time: getTime('kitchenClose'),
      title: "🔒 Cocina cerrada | Kitchen Closed",
      body: "Nothing more to eat tonight. Protect your sleep."
    });

    // Exercise — only on relevant days
    if (['rowing', 'recovery'].includes(dayType)) {
      if (isEnabled('exercise')) notifs.push({
        id: 'exercise', time: getTime('exercise'),
        title: "🚣 Hora de remar | Time to Row",
        body: dayType === 'rowing' ? "Row + bodyweight. Rescue inhaler ready." : "15 min easy recovery row. Conversational pace only.",
        action: dayType === 'rowing' ? 'spotifyRowing' : null
      });
    }

    // Evening
    if (isEnabled('eveningNicotine')) notifs.push({
      id: 'eveningNicotine', time: getTime('eveningNicotine'),
      title: "🚭 Ventana sin nicotina | Nicotine-Free Window",
      body: "Switch to zero-nicotine vape now. Window active until sleep.",
      action: 'startNicotineWindow',
      windowData: { id: 'evening', label: 'Evening', endTime: getTime('sleep') }
    });

    if (isEnabled('lastAlcohol')) notifs.push({
      id: 'lastAlcohol', time: getTime('lastAlcohol'),
      title: "🍺 Último alcohol | Last Alcohol Cutoff",
      body: "Nothing more to drink after this. Protect sleep quality."
    });

    if (isEnabled('windDown')) notifs.push({
      id: 'windDown', time: getTime('windDown'),
      title: "📵 Modo descanso | Wind Down",
      body: "No news, reduce screens. Herbal tea. Almost time."
    });

    if (isEnabled('magnesium')) notifs.push({
      id: 'magnesium', time: getTime('magnesium'),
      title: "💊 Magnesio | Magnesium",
      body: "Magnesium glycinate 300–400mg + Trazodone. Take now."
    });

    if (isEnabled('breathing')) notifs.push({
      id: 'breathing', time: getTime('breathing'),
      title: "🫁 Respiración | Breathing + Bed",
      body: "5–10 breathing cycles. Brown noise on. Sleep target approaching.",
      action: 'spotifyWindDown'
    });

    // Nicotine windows around meals
    const meals = [
      { id: 'breakfast', schedKey: 'breakfast' },
      { id: 'morningSnack', schedKey: 'morningSnack' },
      { id: 'lunch', schedKey: 'lunch' },
      { id: 'afternoonSnack', schedKey: 'afternoonSnack' }
    ];

    meals.forEach(meal => {
      const mealTime = getTime(meal.schedKey);
      if (!mealTime) return;

      const preMinutes = t.nicotinePreMeal ? t.nicotinePreMeal.minutes : 15;
      const postMinutes = t.nicotinePostMeal ? t.nicotinePostMeal.minutes : 30;

      const preTime = this.subtractMinutes(mealTime, preMinutes);
      const postTime = this.addMinutes(mealTime, postMinutes);

      notifs.push({
        id: `nic_pre_${meal.id}`, time: preTime,
        title: "🚭 Ventana sin nicotina",
        body: `Zero-nicotine vape only — ${preMinutes} min before meal`,
        action: 'startNicotineWindow',
        windowData: { id: `meal_${meal.id}`, label: `Around ${meal.id}`, endTime: postTime }
      });

      notifs.push({
        id: `nic_post_${meal.id}`, time: postTime,
        title: "✓ Ventana cerrada | Window closed",
        body: `Nicotine-free window complete ✓`,
        action: 'endNicotineWindow',
        windowId: `meal_${meal.id}`
      });
    });

    // Exercise nicotine windows
    if (['rowing', 'recovery'].includes(dayType)) {
      const exerciseTime = getTime('exercise');
      if (exerciseTime) {
        const preMin = t.nicotinePreExercise ? t.nicotinePreExercise.minutes : 30;
        const postMin = t.nicotinePostExercise ? t.nicotinePostExercise.minutes : 15;
        const preTime = this.subtractMinutes(exerciseTime, preMin);
        const postTime = this.addMinutes(exerciseTime, 30 + postMin); // Approx session length

        notifs.push({
          id: 'nic_pre_exercise', time: preTime,
          title: "🚭 Pre-ejercicio sin nicotina",
          body: `Zero-nicotine vape only — ${preMin} min before rowing`,
          action: 'startNicotineWindow',
          windowData: { id: 'exercise', label: 'Exercise', endTime: postTime }
        });

        notifs.push({
          id: 'nic_post_exercise', time: postTime,
          title: "✓ Ventana de ejercicio cerrada",
          body: "Post-exercise nicotine-free window complete ✓",
          action: 'endNicotineWindow',
          windowId: 'exercise'
        });
      }
    }

    return notifs;
  },

  // ---- SEND NOTIFICATION ----
  send(notif) {
    if (this.permission !== 'granted') return;

    const settings = CL.Storage.getNotificationSettings();
    const s = settings[notif.id];
    if (s && s.enabled === false) return;

    try {
      const n = new Notification(notif.title, {
        body: notif.body,
        icon: '/assets/icons/icon-192.png',
        badge: '/assets/icons/icon-192.png',
        tag: notif.id,
        requireInteraction: notif.persistent || false,
        silent: false
      });

      n.onclick = () => {
        window.focus();
        if (notif.page) window.location.hash = notif.page;
      };
    } catch (e) {}
  },

  // ---- NICOTINE WINDOW BANNER ----
  activeWindows: {},

  startNicotineWindowBanner(windowData) {
    if (!windowData) return;
    this.activeWindows[windowData.id] = windowData;
    this.updateNicotineUI();
  },

  endNicotineWindowBanner(windowId) {
    delete this.activeWindows[windowId];
    this.updateNicotineUI();
  },

  startNicotineWindowMonitor() {
    // Check every minute if we're in a nicotine window
    if (this.nicotineWindowInterval) clearInterval(this.nicotineWindowInterval);
    this.nicotineWindowInterval = setInterval(() => {
      this.checkCurrentNicotineWindows();
      this.updateNicotineUI();
    }, 60000);
    this.checkCurrentNicotineWindows();
  },

  checkCurrentNicotineWindows() {
    const now = this.currentTimeString();
    const schedule = CL.Storage.getSchedule();
    const today = new Date().getDay();
    const dayType = CL.DAY_TYPES[today].type;

    // Morning window
    const wakeTime = schedule.wake ? schedule.wake.time : '05:45';
    const morningWindowMinutes = schedule.morningNicotineWindow ? schedule.morningNicotineWindow.minutes : 60;
    const morningEnd = this.addMinutes(wakeTime, morningWindowMinutes);

    if (this.timeInRange(now, wakeTime, morningEnd)) {
      this.activeWindows['morning'] = {
        id: 'morning', label: 'Ventana matutina | Morning window',
        endTime: morningEnd, countdown: true
      };
    } else {
      delete this.activeWindows['morning'];
    }

    // Evening window
    const eveningStart = schedule.eveningNicotine ? schedule.eveningNicotine.time : '19:00';
    const sleepTime = schedule.sleep ? schedule.sleep.time : '22:45';

    if (this.timeInRange(now, eveningStart, sleepTime)) {
      this.activeWindows['evening'] = {
        id: 'evening', label: 'Ventana nocturna | Evening window',
        endTime: sleepTime, countdown: true
      };
    } else {
      delete this.activeWindows['evening'];
    }

    // Meal windows
    const meals = [
      { id: 'breakfast', key: 'breakfast' },
      { id: 'morningSnack', key: 'morningSnack' },
      { id: 'lunch', key: 'lunch' },
      { id: 'afternoonSnack', key: 'afternoonSnack' }
    ];

    const preMins = schedule.nicotinePreMeal ? schedule.nicotinePreMeal.minutes : 15;
    const postMins = schedule.nicotinePostMeal ? schedule.nicotinePostMeal.minutes : 30;

    meals.forEach(meal => {
      const mealTime = schedule[meal.key] ? schedule[meal.key].time : null;
      if (!mealTime) return;
      const windowStart = this.subtractMinutes(mealTime, preMins);
      const windowEnd = this.addMinutes(mealTime, postMins);

      if (this.timeInRange(now, windowStart, windowEnd)) {
        this.activeWindows[`meal_${meal.id}`] = {
          id: `meal_${meal.id}`,
          label: `Around ${meal.id} | Alrededor de comida`,
          endTime: windowEnd, countdown: true
        };
      } else {
        delete this.activeWindows[`meal_${meal.id}`];
      }
    });

    // Exercise windows
    if (['rowing', 'recovery'].includes(dayType)) {
      const exerciseTime = schedule.exercise ? schedule.exercise.time : '16:00';
      const preMin = schedule.nicotinePreExercise ? schedule.nicotinePreExercise.minutes : 30;
      const postMin = schedule.nicotinePostExercise ? schedule.nicotinePostExercise.minutes : 15;
      const windowStart = this.subtractMinutes(exerciseTime, preMin);
      const windowEnd = this.addMinutes(exerciseTime, 30 + postMin);

      if (this.timeInRange(now, windowStart, windowEnd)) {
        this.activeWindows['exercise'] = {
          id: 'exercise',
          label: 'Pre/Post ejercicio | Pre/Post exercise',
          endTime: windowEnd, countdown: true
        };
      } else {
        delete this.activeWindows['exercise'];
      }
    }
  },

  updateNicotineUI() {
    const banner = document.getElementById('nicotine-banner');
    const windows = Object.values(this.activeWindows);

    if (!banner) return;

    if (windows.length === 0) {
      banner.style.display = 'none';
      return;
    }

    banner.style.display = 'block';

    // Show the most relevant window (prefer evening/morning over meal windows)
    const priority = windows.sort((a, b) => {
      const order = ['morning', 'evening', 'exercise'];
      const ai = order.indexOf(a.id);
      const bi = order.indexOf(b.id);
      return (bi > -1 ? bi : 99) - (ai > -1 ? ai : 99);
    });

    const active = priority[0];
    const remaining = this.minutesUntil(active.endTime);
    const progress = this.windowProgress(active);

    banner.innerHTML = `
      <div class="nicotine-banner-inner">
        <div class="nicotine-banner-left">
          <span class="nicotine-icon">🚭</span>
          <div>
            <div class="nicotine-label">${active.label}</div>
            <div class="nicotine-sublabel">Zero nicotine vape only</div>
          </div>
        </div>
        <div class="nicotine-banner-right">
          <div class="nicotine-countdown">${remaining > 0 ? remaining + ' min' : 'ending soon'}</div>
          <div class="nicotine-progress-bar">
            <div class="nicotine-progress-fill" style="width:${progress}%"></div>
          </div>
        </div>
      </div>
      ${windows.length > 1 ? `<div class="nicotine-multiple">+${windows.length - 1} more window${windows.length > 2 ? 's' : ''} active</div>` : ''}
    `;
  },

  // ---- TIME UTILITIES ----
  currentTimeString() {
    const now = new Date();
    return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  },

  addMinutes(timeStr, minutes) {
    if (!timeStr) return '00:00';
    const [h, m] = timeStr.split(':').map(Number);
    const total = h * 60 + m + minutes;
    return `${String(Math.floor(total / 60) % 24).padStart(2,'0')}:${String(total % 60).padStart(2,'0')}`;
  },

  subtractMinutes(timeStr, minutes) {
    if (!timeStr) return '00:00';
    const [h, m] = timeStr.split(':').map(Number);
    let total = h * 60 + m - minutes;
    if (total < 0) total += 24 * 60;
    return `${String(Math.floor(total / 60)).padStart(2,'0')}:${String(total % 60).padStart(2,'0')}`;
  },

  msUntilTime(timeStr) {
    if (!timeStr) return -1;
    const [h, m] = timeStr.split(':').map(Number);
    const now = new Date();
    const target = new Date(now);
    target.setHours(h, m, 0, 0);
    if (target <= now) target.setDate(target.getDate() + 1);
    return target - now;
  },

  minutesUntil(timeStr) {
    if (!timeStr) return 0;
    return Math.round(this.msUntilTime(timeStr) / 60000);
  },

  timeInRange(current, start, end) {
    if (!current || !start || !end) return false;
    if (end < start) {
      // Crosses midnight
      return current >= start || current <= end;
    }
    return current >= start && current <= end;
  },

  windowProgress(windowData) {
    if (!windowData.startTime || !windowData.endTime) return 50;
    const now = this.currentTimeString();
    const start = windowData.startTime || '00:00';
    const end = windowData.endTime;
    const total = this.timeDiffMinutes(start, end);
    const elapsed = this.timeDiffMinutes(start, now);
    return Math.min(100, Math.max(0, (elapsed / total) * 100));
  },

  timeDiffMinutes(start, end) {
    const [sh, sm] = start.split(':').map(Number);
    const [eh, em] = end.split(':').map(Number);
    return (eh * 60 + em) - (sh * 60 + sm);
  }
};

    const tasks = CL.App ? CL.App.getAllTasksForDay(today) : [];
    const checked = CL.Storage.getChecked(today);
    const nnTasks = CL.TASKS.nonNegotiables;
    const nnDone = nnTasks.every(t => checked[t.id]);

    if (nnDone) {
      if (streaks.lastNNDate !== todayKey) {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;

        if (streaks.lastNNDate === yesterdayKey) {
          streaks.nnStreak = (streaks.nnStreak || 0) + 1;
        } else {
          streaks.nnStreak = 1;
        }
        streaks.lastNNDate = todayKey;
        streaks.nnBest = Math.max(streaks.nnBest || 0, streaks.nnStreak);
        CL.Storage.saveStreaks(streaks);
      }
    }
  },

  getStreakData() {
    return CL.Storage.getStreaks();
  }
};

CL.HealthConnect = {
  available: false,
  connected: false,

  async init() {
    // Check if Health Connect is available (Android 14+)
    if ('health' in navigator || window.healthConnect) {
      this.available = true;
      await this.checkConnection();
    } else {
      // Fall back to manual entry
      this.available = false;
    }
  },

  async checkConnection() {
    try {
      if (window.healthConnect) {
        const status = await window.healthConnect.getGrantedPermissions();
        this.connected = status && status.length > 0;
      }
    } catch { this.connected = false; }
  },

  async requestPermissions() {
    if (!window.healthConnect) {
      this.showSetupGuide();
      return false;
    }
    try {
      const granted = await window.healthConnect.requestPermissions([
        { accessType: 'read', recordType: 'Steps' },
        { accessType: 'read', recordType: 'SleepSession' },
        { accessType: 'read', recordType: 'HeartRate' },
        { accessType: 'read', recordType: 'HeartRateVariabilitySdnn' },
        { accessType: 'read', recordType: 'ActiveCaloriesBurned' },
        { accessType: 'read', recordType: 'OxygenSaturation' }
      ]);
      this.connected = granted && granted.length > 0;
      return this.connected;
    } catch (e) {
      console.error('Health Connect permission error:', e);
      return false;
    }
  },

  async getTodaySteps() {
    if (!this.connected || !window.healthConnect) return null;
    try {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);

      const records = await window.healthConnect.readRecords('Steps', {
        timeRangeFilter: {
          type: 'between',
          startTime: today.toISOString(),
          endTime: tomorrow.toISOString()
        }
      });
      return records.reduce((sum, r) => sum + (r.count || 0), 0);
    } catch { return null; }
  },

  async getLastNightSleep() {
    if (!this.connected || !window.healthConnect) return null;
    try {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      yesterday.setHours(18, 0, 0, 0);
      const now = new Date();

      const records = await window.healthConnect.readRecords('SleepSession', {
        timeRangeFilter: {
          type: 'between',
          startTime: yesterday.toISOString(),
          endTime: now.toISOString()
        }
      });

      if (!records || records.length === 0) return null;

      const latest = records[records.length - 1];
      const durationMs = new Date(latest.endTime) - new Date(latest.startTime);
      const hours = durationMs / (1000 * 60 * 60);

      // Parse sleep stages if available
      const stages = {};
      if (latest.stages) {
        latest.stages.forEach(s => {
          stages[s.stage] = (stages[s.stage] || 0) + (new Date(s.endTime) - new Date(s.startTime));
        });
      }

      return {
        hours: Math.round(hours * 10) / 10,
        startTime: latest.startTime,
        endTime: latest.endTime,
        stages: {
          deep: Math.round((stages[4] || 0) / 60000),    // minutes
          rem: Math.round((stages[5] || 0) / 60000),
          light: Math.round((stages[2] || 0) / 60000),
          awake: Math.round((stages[1] || 0) / 60000)
        }
      };
    } catch { return null; }
  },

  async getTodayHRV() {
    if (!this.connected || !window.healthConnect) return null;
    try {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const now = new Date();

      const records = await window.healthConnect.readRecords('HeartRateVariabilitySdnn', {
        timeRangeFilter: {
          type: 'between',
          startTime: today.toISOString(),
          endTime: now.toISOString()
        }
      });

      if (!records || records.length === 0) return null;
      const avg = records.reduce((sum, r) => sum + r.heartRateVariabilityMillis, 0) / records.length;
      return Math.round(avg);
    } catch { return null; }
  },

  async getRestingHeartRate() {
    if (!this.connected || !window.healthConnect) return null;
    try {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const now = new Date();

      const records = await window.healthConnect.readRecords('HeartRate', {
        timeRangeFilter: {
          type: 'between',
          startTime: today.toISOString(),
          endTime: now.toISOString()
        }
      });

      if (!records || records.length === 0) return null;
      const min = Math.min(...records.flatMap(r => r.samples.map(s => s.beatsPerMinute)));
      return min;
    } catch { return null; }
  },

  // Sync all available data and store it
  async syncToday() {
    const data = {};

    const [steps, sleep, hrv, hr] = await Promise.all([
      this.getTodaySteps(),
      this.getLastNightSleep(),
      this.getTodayHRV(),
      this.getRestingHeartRate()
    ]);

    if (steps !== null) data.steps = steps;
    if (sleep !== null) data.sleep = sleep;
    if (hrv !== null) data.hrv = hrv;
    if (hr !== null) data.restingHR = hr;

    if (Object.keys(data).length > 0) {
      CL.Storage.saveHealthData(data);
      this.updateHealthUI(data);
    }

    return data;
  },

  updateHealthUI(data) {
    const stepsEl = document.getElementById('hc-steps');
    const sleepEl = document.getElementById('hc-sleep');
    const hrvEl = document.getElementById('hc-hrv');
    const hrEl = document.getElementById('hc-hr');

    if (stepsEl && data.steps !== undefined) {
      stepsEl.textContent = data.steps.toLocaleString();
    }
    if (sleepEl && data.sleep) {
      sleepEl.textContent = `${data.sleep.hours}h`;
    }
    if (hrvEl && data.hrv !== undefined) {
      hrvEl.textContent = `${data.hrv}ms`;
    }
    if (hrEl && data.restingHR !== undefined) {
      hrEl.textContent = `${data.restingHR} bpm`;
    }
  },

  showSetupGuide() {
    CL.UI.showModal('Connect Galaxy Watch', `
      <div style="line-height:1.7">
        <p style="margin-bottom:16px">Connect your Galaxy Watch data to Christopher's Life in 3 steps:</p>

        <div style="background:var(--surface-2);border-radius:12px;padding:16px;margin-bottom:12px">
          <div style="font-weight:700;color:var(--teal);margin-bottom:8px">Step 1 — Enable Health Connect</div>
          <p style="font-size:13px;opacity:0.8">Open <strong>Settings → Apps → Health Connect</strong> on your Galaxy. If not installed, download it from the Play Store (it's free).</p>
        </div>

        <div style="background:var(--surface-2);border-radius:12px;padding:16px;margin-bottom:12px">
          <div style="font-weight:700;color:var(--teal);margin-bottom:8px">Step 2 — Connect Samsung Health</div>
          <p style="font-size:13px;opacity:0.8">Open <strong>Samsung Health → Settings → Connected Services → Health Connect</strong>. Enable it and allow all data types.</p>
        </div>

        <div style="background:var(--surface-2);border-radius:12px;padding:16px;margin-bottom:16px">
          <div style="font-weight:700;color:var(--teal);margin-bottom:8px">Step 3 — Grant Permissions</div>
          <p style="font-size:13px;opacity:0.8">Tap the button below. Your Galaxy Watch data (steps, sleep, HRV, heart rate) will sync automatically.</p>
        </div>

        <button onclick="CL.HealthConnect.requestPermissions().then(ok => { if(ok) CL.UI.closeModal(); })"
          style="width:100%;padding:14px;background:var(--teal);color:black;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer">
          Connect Health Data
        </button>

        <p style="font-size:12px;opacity:0.5;margin-top:12px;text-align:center">
          Or enter data manually in the tracking section
        </p>
      </div>
    `);
  },

  getStatusHTML() {
    if (this.connected) {
      return `<span style="color:var(--teal)">✓ Galaxy Watch connected</span>`;
    }
    if (this.available) {
      return `<button onclick="CL.HealthConnect.requestPermissions()" class="btn-secondary">Connect Galaxy Watch</button>`;

  renderChecklist() {

    page.innerHTML = `

            return `<span class="day-badge" style="color:${opt.color}">${opt.emoji} ${opt.label}</span>`;

              value="${CL.Storage.getSetting('brownNoiseVolume', 0.5)}"

  renderTaskSection(title, titleEs, tasks, dayIndex, checked, showEs) {
    return `
      <div class="section-header">
        <span class="section-title">${title}</span>
        <div class="section-line"></div>
      </div>
      <div class="px-16">
        ${tasks.map(t => this.renderTask(t, dayIndex, checked, showEs)).join('')}
      </div>
    `;
  },

  getDayType(dayIndex) {
    const types = CL.Storage.getDayTypes(dayIndex);
    return types[0] || 'flexible';
  },

  getDayTypes(dayIndex) {
    return CL.Storage.getDayTypes(dayIndex);
  },

  renderAllExerciseSections(dayIndex, checked, showEs) {
    const types = this.getDayTypes(dayIndex);
    const titles = {
      travel: '✈️ Travel Activity', rest: '😌 Rest Day',
      cardio: '🚣 Cardio', fitness: '💪 Fitness',
      recovery: '🌊 Recovery Day', alcoholfree: '🚫 Alcohol Free',
      flexible: '⚡ Flexible'
    };
    return types.map(t => {
      const tasks = CL.TASKS.exercise[t] || CL.TASKS.exercise.flexible;
      return this.renderTaskSection(titles[t] || t, '', tasks, dayIndex, checked, showEs);
    }).join('');
  },

  changeDayTypes(dayIndex) {
    CL.App._dayTypeSelected = [...CL.Storage.getDayTypes(dayIndex)];
    CL.App._dayTypeIndex = dayIndex;
    const dayName = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dayIndex];
    CL.UI.showModal('Day Types — ' + dayName, this._renderDayTypeOptions() + `
      <button onclick="CL.App.saveDayTypes()" class="btn btn-primary btn-full mt-8">Save</button>
      <button onclick="CL.App.resetDayTypes(${dayIndex})" class="btn btn-secondary btn-full mt-8" style="font-size:12px">↩ Reset to default</button>
    `);
  },

  _renderDayTypeOptions() {
    const arr = CL.App._dayTypeSelected || [];
    return '<div id="day-type-options">' + CL.DAY_TYPE_OPTIONS.map(t => {
      const isOn = arr.includes(t.key);
      return `<button onclick="CL.App._toggleDayTypeSelect('${t.key}')"
        style="display:flex;align-items:center;gap:12px;width:100%;padding:11px 14px;
               background:${isOn ? t.color + '22' : 'var(--surface-2)'};
               color:${isOn ? t.color : 'var(--text)'};
               border:1.5px solid ${isOn ? t.color : 'var(--border)'};
               border-radius:10px;margin-bottom:8px;cursor:pointer;font-family:var(--font-body);text-align:left">
        <span style="font-size:18px">${t.emoji}</span>
        <span style="font-weight:600;font-size:14px;flex:1">${t.label}</span>
        ${isOn ? '<span style="font-size:16px">✓</span>' : ''}
      </button>`;
    }).join('') + '</div>';
  },

  _toggleDayTypeSelect(key) {
    const arr = CL.App._dayTypeSelected;
    const idx = arr.indexOf(key);
    if (idx > -1) { if (arr.length > 1) arr.splice(idx, 1); }
    else arr.push(key);
    const container = document.getElementById('day-type-options');
    if (container) container.outerHTML = CL.App._renderDayTypeOptions();
  },

  saveDayTypes() {
    CL.Storage.setDayTypes(CL.App._dayTypeIndex, CL.App._dayTypeSelected);
    CL.UI.closeModal();
    CL.UI.showToast('✓ Day types updated');
    this.renderChecklist();
  },

  resetDayTypes(dayIndex) {
    const overrides = CL.Storage.getSetting('dayTypeMulti', {});
    delete overrides[dayIndex];
    CL.Storage.saveSetting('dayTypeMulti', overrides);
    CL.UI.closeModal();
    CL.UI.showToast('↩ Reset to default');
    this.renderChecklist();
  },

  renderCustomTaskSection(dayIndex, checked, showEs) {
    const tasks = CL.Storage.getCustomTasks();
    const addBtn = '<button class="btn btn-secondary btn-sm" style="font-size:11px" onclick="CL.App.addCustomTask()">+ Add custom task</button>';
    if (tasks.length === 0) return '<div class="px-16 mt-4 mb-8">' + addBtn + '</div>';
    return `
      <div class="section-header">
        <span class="section-title">📌 Custom Tasks</span>
        <div class="section-line"></div>
        <button onclick="CL.App.addCustomTask()" style="background:none;border:none;color:var(--teal);font-size:12px;cursor:pointer;margin-left:8px;white-space:nowrap">+ Add</button>
      </div>
      <div class="px-16">
        ${tasks.map(t => {
          const isChecked = !!checked[t.id];
          return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <button class="task-item${isChecked ? ' checked' : ''}" style="flex:1"
              onclick="CL.App.toggleTask(${dayIndex}, '${t.id}')">
              <span class="task-icon">${t.icon || '📌'}</span>
              <div class="task-content"><div class="task-label">${t.label}</div></div>
              <div class="task-checkbox">
                <svg width="10" height="8" viewBox="0 0 10 8" fill="none">

                </svg>
              </div>
            </button>
            <button onclick="CL.App.editCustomTask('${t.id}')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text-3);font-size:11px;cursor:pointer;flex-shrink:0">✎</button>
            <button onclick="CL.App.deleteCustomTask('${t.id}')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--danger);font-size:11px;cursor:pointer;flex-shrink:0">✕</button>
          </div>`;
        }).join('')}
      </div>
    `;
  },

  addCustomTask() {
    CL.UI.showModal('Add Custom Task', `
      <div style="margin-bottom:12px">
        <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px">Task name</label>
        <input type="text" id="ct-label" placeholder="e.g. Take vitamins">
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:8px">Icon</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
          ${['📌','💊','🥤','📝','🧘','🚶','💧','🌿','📞','🛁','🧹','📖','☀️','🌙','❤️','⭐'].map(e =>
            `<button onclick="document.getElementById('ct-icon').value='${e}'"
              style="background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:7px;font-size:17px;cursor:pointer">${e}</button>`
          ).join('')}
        </div>
        <input type="text" id="ct-icon" value="📌" style="width:72px;text-align:center;font-size:18px">
      </div>
      <button onclick="CL.App.saveCustomTask()" class="btn btn-primary btn-full">Add Task</button>
    `);
  },

  editCustomTask(id) {
    const task = CL.Storage.getCustomTasks().find(t => t.id === id);
    if (!task) return;
    CL.UI.showModal('Edit Task', `
      <div style="margin-bottom:12px">
        <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px">Task name</label>
        <input type="text" id="ct-label" value="${task.label}">
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px">Icon</label>
        <input type="text" id="ct-icon" value="${task.icon || '📌'}" style="width:72px;text-align:center;font-size:18px">
      </div>
      <button onclick="CL.App.saveCustomTask('${task.id}')" class="btn btn-primary btn-full">Save</button>
    `);
  },

  saveCustomTask(existingId) {
    const label = document.getElementById('ct-label').value.trim();
    const icon = document.getElementById('ct-icon').value.trim() || '📌';
    if (!label) { CL.UI.showToast('Enter a task name'); return; }
    CL.Storage.saveCustomTask({ id: existingId || null, label, icon });
    CL.UI.closeModal();
    CL.UI.showToast(existingId ? '✓ Task updated' : '✓ Task added');
    this.renderChecklist();
  },

  deleteCustomTask(id) {
    CL.Storage.deleteCustomTask(id);
    CL.UI.showToast('Task deleted');
    this.renderChecklist();
  },


  renderTask(task, dayIndex, checked, showEs) {
    const isChecked = !!checked[task.id];
    return `
      <button class="task-item${isChecked ? ' checked' : ''}"
        onclick="CL.App.toggleTask(${dayIndex}, '${task.id}')">
        <span class="task-icon">${task.icon}</span>
        <div class="task-content">
          <div class="task-label">${task.label}</div>
          ${showEs && task.labelEs ? `<div class="task-label-es">${task.labelEs}</div>` : ''}
        </div>
        <div class="task-checkbox">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4L3.5 6.5L9 1" stroke="#0c1419" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>
    `;
  },

  toggleTask(dayIndex, taskId) {
    const checked = CL.Storage.getChecked(dayIndex);
    const newVal = !checked[taskId];
    CL.Storage.setChecked(dayIndex, taskId, newVal);
    if (newVal) CL.UI.showToast('✓ Done');

    // Re-render just the task
    this.renderChecklist();
    CL.Notifications.updateNicotineUI();
  },

  selectDay(dayIndex) {
    this.selectedDay = dayIndex;
    this.renderChecklist();
  },

  getDayProgress(dayIndex) {
    const tasks = this.getAllTasksForDay(dayIndex);
    const checked = CL.Storage.getChecked(dayIndex);
    const done = tasks.filter(t => checked[t.id]).length;
    return { done, total: tasks.length, pct: Math.round((done / tasks.length) * 100) };
  },

  getAllTasksForDay(dayIndex) {
    const types = this.getDayTypes(dayIndex);
    const exTasks = [];
    types.forEach(t => {
      const tasks = CL.TASKS.exercise[t] || [];
      tasks.forEach(task => { if (!exTasks.find(e => e.id === task.id)) exTasks.push(task); });
    });
    const customTasks = CL.Storage.getCustomTasks();
    return [
      ...CL.TASKS.nonNegotiables,
      ...CL.TASKS.morning,
      ...exTasks,
      ...CL.TASKS.meals,
      ...CL.TASKS.nicotine,
      ...CL.TASKS.evening,
      ...customTasks
    ];
  },

  toggleBrownNoise() {
    if (CL.Audio.isPlayingBrownNoise) {
      CL.Audio.stopBrownNoise(0); // immediate stop, no fade when toggling manually
      CL.Audio.updateBrownNoiseUI(false);
    } else {
      CL.Audio.startBrownNoise();
    }
  },

  resetDay() {
    CL.UI.showModal('Reset Today?', `
      <p style="margin-bottom:16px;color:var(--text-2)">This will clear all checked tasks for ${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][this.selectedDay]}.</p>
      <div class="flex gap-8">
        <button onclick="CL.UI.closeModal()" class="btn btn-secondary" style="flex:1">Cancel</button>
        <button onclick="CL.Storage.resetDay(${this.selectedDay});CL.UI.closeModal();CL.App.renderChecklist();CL.UI.showToast('Day reset')"
          class="btn btn-danger" style="flex:1">Reset</button>
      </div>
    `);
  },

  // ---- NUTRITION PAGE ----
  renderNutrition() {
    const page = document.getElementById('page-nutrition');
    if (!page) return;
    const macroLog = CL.Storage.getMacroLog();
    const targets = CL.Storage.getMacroTargets();
    const water = CL.Storage.getWaterLog();
    const showEs = CL.Storage.getSetting('showSpanish', true);

    // Calculate totals including fiber
    const tracked = ['breakfast','morningSnack','lunch','afternoonSnack'];
    const totals = { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
    tracked.forEach(meal => {
      if (macroLog.meals[meal]) {
        totals.calories += Number(macroLog.meals[meal].calories) || 0;
        totals.protein  += Number(macroLog.meals[meal].protein)  || 0;
        totals.carbs    += Number(macroLog.meals[meal].carbs)    || 0;
        totals.fat      += Number(macroLog.meals[meal].fat)      || 0;
        totals.fiber    += Number(macroLog.meals[meal].fiber)    || 0;
      }
    });

    const meals = [
      { key: 'breakfast',     label: 'Breakfast',       labelEs: 'Desayuno' },
      { key: 'morningSnack',  label: 'Morning Snack',   labelEs: 'Merienda' },
      { key: 'lunch',         label: 'Lunch ★',         labelEs: 'Almuerzo ★' },
      { key: 'afternoonSnack',label: 'Afternoon Snack', labelEs: 'Merienda tarde' },
    ];
    const macroColors = { calories:'#f59e0b', protein:'#34d399', carbs:'#60a5fa', fat:'#f87171', fiber:'#a78bfa' };
    const bottleOz = targets.waterOz || 20;
    const waterTarget = targets.waterBottles || 8;

    page.innerHTML = `
      <div class="page-header">
        <div class="header-top">
          <div>
            <div class="app-wordmark">Christopher's Life</div>
            <div class="header-title">Nutrition</div>
          </div>
          <button onclick="CL.App.openMacroTargets()" class="btn btn-secondary btn-sm">Edit targets</button>
        </div>
      </div>

      <!-- Water Counter -->
      <div class="px-16 mt-12">
        <div class="card">
          <div class="card-header">
            <span class="card-title">💧 Water · Agua</span>
            <span class="text-xs text-dim">${bottleOz}oz bottles · target ${waterTarget}</span>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <button class="btn btn-secondary" onclick="CL.App.adjustWater(-1)" style="font-size:20px;padding:8px 16px">−</button>
            <div style="flex:1;text-align:center">
              <div style="font-size:36px;font-weight:700;font-family:var(--font-mono);color:var(--teal)">${water.bottles || 0}</div>
              <div class="text-xs text-dim">${Math.round((water.bottles || 0) * bottleOz)} oz · ${((water.bottles || 0) * bottleOz * 29.5735 / 1000).toFixed(1)}L</div>
              <div class="progress-bar-wrap mt-4">
                <div class="progress-bar-fill" style="width:${Math.min(100,Math.round((water.bottles||0)/waterTarget*100))}%;background:#60a5fa"></div>
              </div>
              <div class="text-xs text-dim mt-4">${waterTarget - (water.bottles||0) > 0 ? waterTarget - (water.bottles||0) + ' more to goal' : '✓ Goal reached!'}</div>
            </div>
            <button class="btn btn-secondary" onclick="CL.App.adjustWater(1)" style="font-size:20px;padding:8px 16px">+</button>
          </div>
        </div>
      </div>

      <!-- Daily Totals -->
      <div class="px-16 mt-8">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Daily Totals (excl. dinner)</span>
            <span class="text-xs text-dim font-mono">${new Date().toLocaleDateString()}</span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px">
            ${[
              { key:'calories', label:'Cal',  value:totals.calories, target:targets.calories, unit:'kcal', color:macroColors.calories },
              { key:'protein',  label:'Pro',  value:totals.protein,  target:targets.protein,  unit:'g',    color:macroColors.protein },
              { key:'carbs',    label:'Carb', value:totals.carbs,    target:targets.carbs,    unit:'g',    color:macroColors.carbs },
              { key:'fat',      label:'Fat',  value:totals.fat,      target:targets.fat,      unit:'g',    color:macroColors.fat },

  openMacroTargets() {
    const t = CL.Storage.getMacroTargets();
    CL.UI.showModal('Edit Daily Targets', `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">

  saveMacroTargets() {

    fields.forEach(f => {
      const el = document.getElementById('mt-'+f);

  openMacroEntry(mealKey, mealLabel) {
    const existing = CL.Storage.getMacroLog().meals[mealKey] || {};
    CL.UI.showModal(`Log ${mealLabel}`, `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">
        ${['protein','carbs','fat','fiber'].map(m => `
          <div>
            <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px;text-transform:capitalize">${m} (g)</label>
            <input type="number" id="macro-${m}" value="${existing[m]||''}" placeholder="0"
              oninput="CL.App.autoCalcKcal()"
              style="text-align:center;font-size:18px;font-weight:700;font-family:var(--font-mono)">
          </div>`).join('')}
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px">Calories (kcal) — auto-calculated</label>

          style="text-align:center;font-size:20px;font-weight:700;font-family:var(--font-mono);color:var(--warning)">
        <div class="text-xs text-dim mt-4">Formula: protein×4 + carbs×4 + fat×9 (fiber excluded from cal calc)</div>
      </div>
      <button onclick="CL.App.saveMacroEntry('${mealKey}')" class="btn btn-primary btn-full">Save</button>
    `);
    // Auto-calc on open if values exist
    setTimeout(() => CL.App.autoCalcKcal(), 50);
  },

  autoCalcKcal() {
    const p = parseFloat(document.getElementById('macro-protein')?.value) || 0;
    const c = parseFloat(document.getElementById('macro-carbs')?.value)   || 0;
    const f = parseFloat(document.getElementById('macro-fat')?.value)     || 0;
    const kcal = Math.round(p * 4 + c * 4 + f * 9);
    const calEl = document.getElementById('macro-calories');
    if (calEl && (p || c || f)) calEl.value = kcal;
  },

  saveMacroEntry(mealKey) {
    const data = {
      calories: parseFloat(document.getElementById('macro-calories').value) || 0,
      protein:  parseFloat(document.getElementById('macro-protein').value)  || 0,
      carbs:    parseFloat(document.getElementById('macro-carbs').value)    || 0,
      fat:      parseFloat(document.getElementById('macro-fat').value)      || 0,
      fiber:    parseFloat(document.getElementById('macro-fiber').value)    || 0,
    };
    CL.Storage.saveMacroEntry(mealKey, data);
    CL.UI.closeModal();
    CL.UI.showToast('✓ Macros saved');
    this.renderNutrition();
  },

  renderScaleSelector(id, label, scale, currentValue) {
    const current = scale.find(s => s.value === currentValue);
    return `
      <div class="mb-8">
        <div class="text-sm mb-8">${label}</div>
        <div class="scale-selector">
          ${scale.map(s => `
            <button class="scale-btn${currentValue === s.value ? ' selected' : ''}"
              onclick="CL.App.setScale('${id}', ${s.value})"
              title="${s.label}: ${s.desc}"
            >${s.value}</button>
          `).join('')}
        </div>
        <div class="scale-description" id="scale-desc-${id}">
          ${current ? `<strong>${current.label}</strong> — ${current.desc}` : 'Tap to log'}
        </div>
      </div>
    `;
  },

  setScale(id, value) {
    CL.Storage.saveDailyLog({ [id]: value });
    const scaleMap = { mood: CL.MOOD_SCALE, energy: CL.ENERGY_SCALE, sleepQuality: CL.SLEEP_SCALE };
    const scale = scaleMap[id];
    const item = scale.find(s => s.value === value);
    const descEl = document.getElementById('scale-desc-' + id);
    if (descEl && item) descEl.innerHTML = '<strong>' + item.label + '</strong> — ' + item.desc;
    // Update button states without full re-render
    document.querySelectorAll('.scale-btn[data-scale="' + id + '"]').forEach(btn => {
      btn.classList.toggle('selected', parseInt(btn.dataset.val) === value);
    });
    // Only re-render the scale selector
    const wrap = document.getElementById('scale-wrap-' + id);
    if (wrap) wrap.outerHTML = this.renderScaleSelector(id, wrap.dataset.label || id, scale, value);
  },

  logMoodEntry() {

      <div style="margin-bottom:16px">

        <div style="display:flex;gap:4px;flex-wrap:wrap" id="mood-btns">

                     border-radius:6px;color:var(--text-2);font-size:12px;font-weight:600;font-family:var(--font-mono);cursor:pointer"
