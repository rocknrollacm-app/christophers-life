  _selectMoodVal(type, value, btn) {
    CL.App['_' + type + 'Val'] = value;
    const container = document.getElementById(type + '-btns');
    if (container) container.querySelectorAll('button').forEach(b => {
      b.style.background = 'var(--surface-2)';
      b.style.color = 'var(--text-2)';
      b.style.borderColor = 'var(--border)';
    });
    btn.style.background = 'var(--teal)';
    btn.style.color = '#0c1419';
    btn.style.borderColor = 'var(--teal)';
    const scale = type === 'mood' ? CL.MOOD_SCALE : CL.ENERGY_SCALE;
    const item = scale.find(s => s.value === value);
    const desc = document.getElementById(type + '-desc');
    if (desc && item) desc.innerHTML = '<strong>' + item.label + '</strong> — ' + item.desc;
  },

  saveMoodEntry() {
    if (!CL.App._moodVal && !CL.App._energyVal) { CL.UI.showToast('Select mood or energy first'); return; }
    const note = document.getElementById('mood-note')?.value?.trim() || '';
    CL.Storage.addMoodEntry({ mood: CL.App._moodVal, energy: CL.App._energyVal, note });
    CL.UI.closeModal();
    CL.UI.showToast('✓ Logged');
    this.renderTracking();
  },

  adjustDrinks(delta) {
    const sub = CL.Storage.getSubstanceLog();
    sub.drinks = Math.max(0, (sub.drinks || 0) + delta);
    CL.Storage.saveSubstanceLog(sub);
    const el = document.getElementById('drink-count');
    if (el) el.textContent = sub.drinks;
  },

  adjustVaping(delta) {
    const sub = CL.Storage.getSubstanceLog();
    const arr = sub.vaping || [];
    if (delta > 0) arr.push({ time: new Date().toISOString() });
    else if (arr.length > 0) arr.pop();
    sub.vaping = arr;
    CL.Storage.saveSubstanceLog(sub);
    const el = document.getElementById('vape-count');
    if (el) el.textContent = arr.length;
  },

  adjustVapeHits(delta) {
    const sub = CL.Storage.getSubstanceLog();
    sub.vapeHits = Math.max(0, (sub.vapeHits || 0) + delta);
    CL.Storage.saveSubstanceLog(sub);
    const el = document.getElementById('vape-hit-count');
    if (el) {
      el.textContent = sub.vapeHits;
      el.style.color = sub.vapeHits > 30 ? 'var(--danger)' : sub.vapeHits > 15 ? 'var(--warning)' : 'var(--teal)';
    }
    const ctx = document.getElementById('vape-hit-context');
    if (ctx) ctx.outerHTML = this.renderVapeHitContext(sub.vapeHits);
  },

  renderVapeHitContext(hits) {
    let msg, color;
    if (hits === 0)      { msg = 'Nothing logged yet today'; color = 'var(--text-3)'; }
    else if (hits <= 5)  { msg = hits + ' hits — very low. Strong day.'; color = 'var(--success)'; }
    else if (hits <= 10) { msg = hits + ' hits — low. You\'re managing well.'; color = 'var(--success)'; }
    else if (hits <= 20) { msg = hits + ' hits — moderate. Typical baseline.'; color = 'var(--teal)'; }
    else if (hits <= 30) { msg = hits + ' hits — elevated. Notice any triggers?'; color = 'var(--warning)'; }
    else if (hits <= 50) { msg = hits + ' hits — high. Worth paying attention to.'; color = 'var(--warning)'; }
    else                 { msg = hits + ' hits — very high. This is real data — use it.'; color = 'var(--danger)'; }
    return '<div id="vape-hit-context" style="font-size:12px;color:' + color + ';margin-top:4px;margin-bottom:4px">' + msg + '</div>';
  },

  renderTaperCard(key, med, savedData) {
    const currentPhase = savedData.currentPhase || 0;
    const isComplete = currentPhase >= med.phases.length;
    return `
      <div class="card mb-8">
        <div class="flex-between mb-8">
          <span class="text-sm" style="font-weight:700">${med.icon} ${med.name}</span>
          <div class="flex gap-8">
            <button class="btn btn-secondary btn-sm" onclick="CL.App.resetTaperPhase('${key}')" style="font-size:11px;opacity:0.6">↩ Reset</button>
            <button class="btn ${isComplete ? 'btn-secondary' : 'btn-primary'} btn-sm"
              onclick="CL.App.advanceTaperPhase('${key}', ${currentPhase}, ${med.phases.length})">
              ${isComplete ? '✓ Done' : 'Advance →'}
            </button>
          </div>
        </div>
        ${med.note ? `<div class="text-xs text-dim mb-8">${med.note}</div>` : ''}
        ${med.phases.map((phase, i) => `
          <div class="taper-phase">
            <div class="taper-dot ${i < currentPhase ? 'done' : i === currentPhase ? 'active' : 'pending'}"></div>
            <div style="flex:1">
              <div class="text-sm ${i === currentPhase ? 'text-teal' : i < currentPhase ? 'text-dim' : ''}">${phase.instruction}</div>
            </div>
            ${i === currentPhase ? '<span class="text-xs text-teal" style="white-space:nowrap">← current</span>' : ''}
            ${i < currentPhase ? '<span class="text-xs text-success" style="white-space:nowrap">✓ done</span>' : ''}
          </div>
        `).join('')}
      </div>
    `;
  },

  advanceTaperPhase(key, current, total) {
    if (current >= total) return;
    const taperData = CL.Storage.getTaperData();
    taperData[key] = { currentPhase: current + 1, advancedDate: CL.Storage.getTodayKey() };
    CL.Storage.saveTaperData(taperData);
    CL.UI.showToast('✓ ' + CL.TAPER[key].name + ' → phase ' + (current + 2));
    this.renderTracking();
  },

  resetTaperPhase(key) {

  _togglePlanType(key, btn, allKeys) {
    const arr = CL.App._planTypes;
    const idx = arr.indexOf(key);
    if (idx > -1) { if (arr.length > 1) arr.splice(idx, 1); }
    else arr.push(key);
    // Update button styles
    document.querySelectorAll('#plan-type-btns button').forEach(b => {
      const t = CL.DAY_TYPE_OPTIONS.find(o => o.key === b.dataset.key);
      if (!t) return;
      const on = arr.includes(t.key);
      b.style.borderColor = on ? t.color : 'var(--border)';
      b.style.background = on ? t.color + '22' : 'var(--surface-2)';
      b.style.color = on ? t.color : 'var(--text-2)';
    });
  },

    if (exercise) CL.Storage.saveScheduleItem('exercise', { time: exercise });

              </div>
              ${log.notes ? `<div class="text-sm text-dim">${log.notes}</div>` : ''}
              ${(log.exercises||[]).map(ex => `
                <div class="stat-row">
                  <span class="text-sm">${ex.name}</span>
                  <span class="text-xs text-dim">${(ex.sets||[]).map((s,i) => `Set ${i+1}: ${s.weight||'BW'}×${s.reps}`).join(' · ')}</span>
                </div>`).join('')}
            </div>`;
          }).join('')}
        </div>` : ''}
    `;
  },

  createWorkout(existingId) {
    const existing = existingId ? CL.Storage.getWorkouts().find(w => w.id === existingId) : null;
    const exercises = existing ? existing.exercises : [{ name: '', sets: 3, reps: 10 }];
    const isEdit = !!existing;

    const renderExRows = (exs) => exs.map((ex, i) => `
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px" id="ex-row-${i}">
        <input type="text" placeholder="Exercise name" value="${ex.name||''}"
          style="flex:1;font-size:13px" id="ex-name-${i}">
        <input type="number" min="1" max="20" value="${ex.sets||3}"
          style="width:52px;text-align:center;font-family:var(--font-mono);font-weight:700" id="ex-sets-${i}"
          title="Sets">
        <span class="text-dim" style="font-size:11px">×</span>
        <input type="number" min="1" max="200" value="${ex.reps||10}"
          style="width:52px;text-align:center;font-family:var(--font-mono);font-weight:700" id="ex-reps-${i}"
          title="Reps">
        <button onclick="CL.App._removeExRow(${i})" style="background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:4px">✕</button>
      </div>`).join('');

    CL.App._workoutExCount = exercises.length;
    CL.App._editWorkoutId = existingId || null;

    CL.UI.showModal((isEdit ? 'Edit' : 'New') + ' Workout', `
      <div style="margin-bottom:12px">
        <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px">Workout name</label>
        <input type="text" id="wo-name" placeholder="e.g. Push Day, Full Body A..." value="${existing ? existing.name : ''}">
      </div>
      <div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <label style="font-size:12px;color:var(--text-3)">Exercises &nbsp;<span style="font-size:10px;opacity:0.5">(name · sets · reps)</span></label>
          <button onclick="CL.App._addExRow()" class="btn btn-secondary btn-sm" style="font-size:11px">+ Add exercise</button>
        </div>
        <div id="ex-rows">${renderExRows(exercises)}</div>
      </div>
      <button onclick="CL.App.saveWorkout()" class="btn btn-primary btn-full mt-8">${isEdit ? 'Save Changes' : 'Create Workout'}</button>
    `);
  },

  _addExRow() {
    CL.App._workoutExCount = (CL.App._workoutExCount || 0) + 1;
    const i = CL.App._workoutExCount - 1;
    const container = document.getElementById('ex-rows');
    if (!container) return;
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
    div.id = 'ex-row-' + i;
    div.innerHTML = `
      <input type="text" placeholder="Exercise name" style="flex:1;font-size:13px" id="ex-name-${i}">
      <input type="number" min="1" max="20" value="3" style="width:52px;text-align:center;font-family:var(--font-mono);font-weight:700" id="ex-sets-${i}" title="Sets">
      <span style="font-size:11px;color:var(--text-3)">×</span>
      <input type="number" min="1" max="200" value="10" style="width:52px;text-align:center;font-family:var(--font-mono);font-weight:700" id="ex-reps-${i}" title="Reps">
      <button onclick="CL.App._removeExRow(${i})" style="background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer;padding:4px">✕</button>
    `;
    container.appendChild(div);
  },

  _removeExRow(i) {
    const row = document.getElementById('ex-row-' + i);
    if (row) row.remove();
  },

  saveWorkout() {
    const name = document.getElementById('wo-name')?.value?.trim();
    if (!name) { CL.UI.showToast('Enter a workout name'); return; }
    const exercises = [];
    for (let i = 0; i < 50; i++) {
      const nameEl = document.getElementById('ex-name-' + i);
      if (!nameEl) continue;
      const n = nameEl.value.trim();
      if (!n) continue;
      const sets = parseInt(document.getElementById('ex-sets-' + i)?.value) || 3;
      const reps = parseInt(document.getElementById('ex-reps-' + i)?.value) || 10;
      exercises.push({ name: n, sets, reps });
    }
    if (exercises.length === 0) { CL.UI.showToast('Add at least one exercise'); return; }
    const workout = { id: CL.App._editWorkoutId, name, exercises };
    CL.Storage.saveWorkout(workout);
    CL.UI.closeModal();
    CL.UI.showToast(CL.App._editWorkoutId ? '✓ Workout updated' : '✓ Workout created');
    this.renderFitness();
  },

  editWorkout(id) { this.createWorkout(id); },

  deleteWorkout(id) {
    const w = CL.Storage.getWorkouts().find(x => x.id === id);
    if (!w) return;
    CL.UI.showModal('Delete ' + w.name + '?', `
      <p class="text-sm text-dim mb-16">This will permanently delete this workout and cannot be undone.</p>
      <div class="flex gap-8">
        <button onclick="CL.UI.closeModal()" class="btn btn-secondary" style="flex:1">Cancel</button>
        <button onclick="CL.Storage.deleteWorkout('${id}');CL.UI.closeModal();CL.App.renderFitness();CL.UI.showToast('Workout deleted')"
          class="btn btn-danger" style="flex:1">Delete</button>
      </div>`);
  },

  startWorkout(id) {
    const w = CL.Storage.getWorkouts().find(x => x.id === id);
    if (!w) return;
    CL.App._activeWorkout = { workoutId: id, startTime: Date.now(), exercises: w.exercises.map(ex => ({ name: ex.name, sets: Array.from({length: ex.sets}, () => ({ reps: ex.reps, weight: '' })) })) };

    const renderLiveWorkout = () => {
      const wo = CL.App._activeWorkout;
      return `
        <div style="margin-bottom:16px">
          <div style="font-weight:700;font-size:18px;margin-bottom:4px">${w.name}</div>
          <div class="text-xs text-dim" id="wo-timer">In progress...</div>
        </div>
        ${wo.exercises.map((ex, ei) => `
          <div style="margin-bottom:16px;background:var(--surface-2);border-radius:10px;padding:12px">
            <div style="font-weight:600;margin-bottom:8px">${ex.name}</div>
            ${ex.sets.map((set, si) => `
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                <span class="text-xs text-dim" style="min-width:40px">Set ${si+1}</span>
                <input type="number" placeholder="lbs / BW"
                  value="${set.weight}"
                  style="width:72px;text-align:center;font-family:var(--font-mono);font-size:14px"
                  onchange="CL.App._activeWorkout.exercises[${ei}].sets[${si}].weight=this.value">
                <span class="text-xs text-dim">×</span>
                <input type="number" value="${set.reps}"
                  style="width:52px;text-align:center;font-family:var(--font-mono);font-size:14px;font-weight:700"
                  onchange="CL.App._activeWorkout.exercises[${ei}].sets[${si}].reps=this.value">
                <span class="text-xs text-dim">reps</span>
              </div>`).join('')}
          </div>`).join('')}
        <div style="margin-bottom:12px">
          <input type="text" id="wo-notes" placeholder="Session notes (optional)" style="font-size:13px">
        </div>
        <button onclick="CL.App.completeWorkout('${id}')" class="btn btn-primary btn-full">✓ Complete Workout</button>
        <button onclick="CL.UI.closeModal()" class="btn btn-secondary btn-full mt-8" style="font-size:12px">Cancel</button>
      `;
    };

    CL.UI.showModal('🏋️ ' + w.name, renderLiveWorkout());

    // Live timer
    CL.App._woTimerInterval = setInterval(() => {
      const el = document.getElementById('wo-timer');
      if (!el) { clearInterval(CL.App._woTimerInterval); return; }
      const elapsed = Math.floor((Date.now() - CL.App._activeWorkout.startTime) / 1000);
      const m = Math.floor(elapsed / 60), s = elapsed % 60;
      el.textContent = `${m}:${String(s).padStart(2,'0')} elapsed`;
    }, 1000);
  },

  completeWorkout(workoutId) {
    clearInterval(CL.App._woTimerInterval);
    const wo = CL.App._activeWorkout;
    const notes = document.getElementById('wo-notes')?.value?.trim() || '';
    const duration = Math.round((Date.now() - wo.startTime) / 60000);
    CL.Storage.logWorkoutComplete(workoutId, { exercises: wo.exercises, notes, duration });
    CL.UI.closeModal();
    CL.UI.showToast('✓ Workout logged — ' + duration + ' min');
    this.renderFitness();
  },

  // ---- SETTINGS PAGE ----
  renderSettings() {
    const page = document.getElementById('page-settings');
    if (!page) return;
    const schedule = CL.Storage.getSchedule();
    const showEs = CL.Storage.getSetting('showSpanish', true);
    const bilingualNotifs = CL.Storage.getSetting('bilingualNotifs', true);

    page.innerHTML = `
      <div class="page-header">
        <div>
          <div class="app-wordmark">Christopher's Life</div>
          <div class="header-title">Settings</div>
          <div class="header-subtitle" style="color:var(--teal);opacity:0.7">Configuración</div>
        </div>
      </div>

      <!-- Spanish -->
      <div class="settings-group mt-16">
        <div class="settings-group-title">🇪🇸 Spanish / Español</div>
        <div>
          ${this.renderSettingsToggle('Show Spanish translations', 'En toda la app', showEs, `CL.Storage.saveSetting('showSpanish', this.checked); CL.App.renderPage(CL.App.currentPage)`)}
          ${this.renderSettingsToggle('Bilingual notifications', 'English + Spanish', bilingualNotifs, `CL.Storage.saveSetting('bilingualNotifs', this.checked)`)}
        </div>
      </div>

      <!-- Schedule -->
      <div class="settings-group">
        <div class="settings-group-title">⏰ Schedule · Horario</div>
        <div>
          ${Object.entries(schedule).filter(([k, v]) => v && v.time && v.editable).map(([key, val]) => `
            <div class="settings-row">
              <div>
                <div class="settings-label">${val.label}</div>
              </div>
              <input type="time" value="${val.time}"
                style="width:90px;font-family:var(--font-mono);font-size:14px;padding:6px 8px"
                onchange="CL.App.updateScheduleTime('${key}', this.value)">
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Nicotine Windows -->
      <div class="settings-group">
        <div class="settings-group-title">🚭 Nicotine Windows · Ventanas sin nicotina</div>
        <div>
          ${[
            { key: 'morningNicotineWindow', label: 'Morning window (min after wake)', field: 'minutes' },
            { key: 'nicotinePreMeal', label: 'Before meals (minutes)', field: 'minutes' },
            { key: 'nicotinePostMeal', label: 'After meals (minutes)', field: 'minutes' },
            { key: 'nicotinePreExercise', label: 'Before exercise (minutes)', field: 'minutes' },
            { key: 'nicotinePostExercise', label: 'After exercise (minutes)', field: 'minutes' }
          ].map(item => `
            <div class="settings-row">
              <div class="settings-label">${item.label}</div>
              <input type="number" min="0" max="120"
                value="${schedule[item.key] ? schedule[item.key][item.field] : 30}"
                style="width:64px;text-align:center;font-family:var(--font-mono);font-size:15px;font-weight:700"
                onchange="CL.App.updateScheduleField('${item.key}', '${item.field}', parseInt(this.value))">
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Audio -->
      <div class="settings-group">
        <div class="settings-group-title">🎵 Audio</div>
        <div>
          <div class="settings-row">
            <div>
              <div class="settings-label">Brown noise → music gap</div>
              <div class="settings-sublabel">Minutes of silence between</div>
            </div>
            <input type="number" min="0" max="30"
              value="${CL.Storage.getSetting('brownNoiseToMusicGap', 5)}"
              style="width:64px;text-align:center;font-family:var(--font-mono);font-size:15px;font-weight:700"
              onchange="CL.Storage.saveSetting('brownNoiseToMusicGap', parseInt(this.value))">
          </div>
          <div class="settings-row">
            <div>
              <div class="settings-label">Brown noise fade duration</div>
              <div class="settings-sublabel">Seconds to fade out</div>
            </div>
            <input type="number" min="0" max="300"
              value="${CL.Storage.getSetting('brownNoiseFadeSeconds', 60)}"
              style="width:64px;text-align:center;font-family:var(--font-mono);font-size:15px;font-weight:700"
              onchange="CL.Storage.saveSetting('brownNoiseFadeSeconds', parseInt(this.value))">
          </div>
          <div class="settings-row">
            <div>
              <div class="settings-label">Spotify client ID</div>
              <div class="settings-sublabel">From developer.spotify.com</div>
            </div>
            <div>${CL.Spotify.getStatusHTML()}</div>
          </div>
        </div>
      </div>

      <!-- Health Connect -->
      <div class="settings-group">
        <div class="settings-group-title">⌚ Galaxy Watch</div>
        <div class="settings-row">
          <div>
            <div class="settings-label">Samsung Health Connect</div>
            <div class="settings-sublabel">Steps, sleep, HRV, heart rate</div>
          </div>
          <div>${CL.HealthConnect.getStatusHTML()}</div>
        </div>
      </div>

      <!-- Notifications -->
      <div class="settings-group">
        <div class="settings-group-title">🔔 Notifications</div>
        <div class="settings-row">
          <div>
            <div class="settings-label">Permission status</div>
            <div class="settings-sublabel">${CL.Notifications.permission === 'granted' ? '✓ Granted' : 'Not granted'}</div>
          </div>
          <button class="btn btn-secondary btn-sm"
            onclick="CL.Notifications.requestPermission().then(ok => CL.App.renderSettings())">
            ${CL.Notifications.permission === 'granted' ? 'Granted ✓' : 'Enable'}
          </button>
        </div>
        <div class="settings-row">
          <div class="settings-label">Reschedule all notifications</div>
          <button class="btn btn-secondary btn-sm"
            onclick="CL.Notifications.scheduleAllNotifications();CL.UI.showToast('✓ Notifications rescheduled')">
            Reschedule
          </button>
        </div>
      </div>

      <!-- Reference Cards -->
      <div class="settings-group">
        <div class="settings-group-title">📋 Quick Reference</div>
        <div>
          ${CL.REFERENCE_CARDS.map(card => `
            <div class="settings-row" onclick="CL.App.showReferenceCard('${card.id}')" style="cursor:pointer">
              <div class="settings-label">${card.icon} ${card.title}</div>
              <span style="color:var(--text-3)">›</span>
            </div>
          `).join('')}
          <div class="settings-row" onclick="CL.App.generateDoctorPrep()" style="cursor:pointer">
            <div class="settings-label">🩺 Generate Appointment Prep</div>
            <span style="color:var(--text-3)">›</span>
          </div>
        </div>
      </div>

      <!-- Data -->
      <div class="settings-group">
        <div class="settings-group-title">🗄️ Data</div>
        <div>
          <div class="settings-row" onclick="CL.App.exportData()" style="cursor:pointer">
            <div class="settings-label">Export week data</div>
            <span style="color:var(--text-3)">›</span>
          </div>
          <div class="settings-row" onclick="CL.App.confirmClearData()" style="cursor:pointer">
            <div class="settings-label" style="color:var(--danger)">Clear all data</div>
            <span style="color:var(--danger)">›</span>
          </div>
        </div>
      </div>

      <!-- About -->
      <div class="px-16 mb-32 mt-16 text-center">
        <div>${this.getFibonacciSVG(48)}</div>
        <div class="text-display mt-8" style="font-size:16px;color:var(--teal)">Christopher's Life</div>
        <div class="text-xs text-dim mt-4">Built for Christopher · 2025</div>
        <div class="text-xs text-dim mt-2">PWA v1.0 · Dark slate + teal</div>
      </div>
    `;
  },

  renderSettingsToggle(label, sublabel, value, onchange) {
    return `
      <div class="settings-row">
        <div>
          <div class="settings-label">${label}</div>
          <div class="settings-sublabel">${sublabel}</div>
        </div>
        <label class="toggle">
          <input type="checkbox" ${value ? 'checked' : ''} onchange="${onchange}">
          <span class="toggle-slider"></span>
        </label>
      </div>
    `;
  },

  updateScheduleTime(key, value) {
    CL.Storage.saveScheduleItem(key, { time: value });
    CL.Notifications.scheduleAllNotifications();
    CL.Notifications.checkCurrentNicotineWindows();
    CL.UI.showToast('✓ Schedule updated');
  },

  updateScheduleField(key, field, value) {
    CL.Storage.saveScheduleItem(key, { [field]: value });
    CL.Notifications.scheduleAllNotifications();
    CL.Notifications.checkCurrentNicotineWindows();
    CL.UI.showToast('✓ Updated');
  },

  showReferenceCard(id) {
    const card = CL.REFERENCE_CARDS.find(c => c.id === id);
    if (!card) return;
    CL.UI.showModal(`${card.icon} ${card.title}`, `
      ${card.content.map(section => `
        <div style="margin-bottom:16px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--teal-dim);margin-bottom:6px">${section.label}</div>
          ${section.items.map(item => `<div style="font-size:13px;padding:4px 0;border-bottom:1px solid var(--border);color:var(--text-2)">${item}</div>`).join('')}
        </div>
      `).join('')}
      <button onclick="CL.UI.closeModal()" class="btn btn-secondary btn-full mt-8">Close</button>
    `);
  },

  exportData() {
    const data = CL.Storage.exportWeekData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `christophers-life-${data.week}.json`;
    a.click();
    URL.revokeObjectURL(url);
    CL.UI.showToast('✓ Data exported');
  },

  confirmClearData() {
    CL.UI.showModal('Clear All Data?', `
      <p style="color:var(--danger);margin-bottom:16px">This will permanently delete all tracked data, scans, logs, and settings.</p>
      <div class="flex gap-8">
        <button onclick="CL.UI.closeModal()" class="btn btn-secondary" style="flex:1">Cancel</button>
        <button onclick="CL.Storage.clearAll();CL.UI.closeModal();CL.App.navigate('checklist');CL.UI.showToast('Data cleared')"
          class="btn btn-danger" style="flex:1">Clear Everything</button>
      </div>
    `);
  }
};

// Boot on DOM ready
document.addEventListener('DOMContentLoaded', () => CL.App.init());

  </script>
</body>
</html>
